name: CI
run-name: "CI · ${{ github.ref_name }}"

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup PDM
        uses: pdm-project/setup-pdm@v4.5
        with:
          python-version: ${{ matrix.python-version }}
          cache: true

      - name: Install dependencies
        run: pdm install -G dev

      - name: Lint
        run: pdm run lint

      - name: Type check
        run: pdm run typecheck

      - name: Test
        run: pdm run test
